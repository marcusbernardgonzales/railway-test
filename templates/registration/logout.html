{% extends "base.html" %}

{% block title %} Common Grounds | Logout {% endblock %}

{% block header %} Logout {% endblock %}

{% block content %}
    <form method="POST" action="{% url 'logout' %}">
        {% if not user.is_authenticated %}
            {{ form.as_p }}
        {% endif %}
        {% csrf_token %}
    <button type="submit">Logout</button>
</form>
{% endblock %}
